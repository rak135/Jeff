[runtime]
default_adapter_id = "ollama_default"

[research]
artifact_store_root = ".jeff_runtime/artifacts/research"
enable_memory_handoff = true

[research.memory]
backend = "local_file"

[[adapters]]
adapter_id = "ollama_default"
provider_kind = "ollama"
provider_name = "ollama"
model_name = "gemma4:31b-cloud"
base_url = "http://127.0.0.1:11434"
timeout_seconds = 300

[adapters.provider_options]
context_length = 16384

[[adapters]]
adapter_id = "ollama_research"
provider_kind = "ollama"
provider_name = "ollama"
model_name = "gemma4:31b-cloud"
base_url = "http://127.0.0.1:11434"
timeout_seconds = 300

[adapters.provider_options]
context_length = 16384

[[adapters]]
adapter_id = "ollama_formatter"
provider_kind = "ollama"
provider_name = "ollama"
model_name = "qwen3:8b"
base_url = "http://127.0.0.1:11434"
timeout_seconds = 60

[adapters.provider_options]
context_length = 8192

[purpose_overrides]
research = "ollama_research"
formatter_bridge = "ollama_formatter"
proposal = "ollama_default"
planning = "ollama_default"
evaluation = "ollama_default"
